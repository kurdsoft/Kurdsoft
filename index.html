<!DOCTYPE html>
<html lang="ku" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>KurdSoft - اشتراکان</title>
    <style>
        body { font-family: 'Cairo', sans-serif; background-color: #0f1b1c; color: #fff; text-align: center; padding: 20px; }
        .container { display: flex; flex-wrap: wrap; justify-content: center; gap: 20px; margin-top: 50px; }
        .card { background-color: #1c2e30; padding: 30px; border-radius: 20px; border: 1px solid #d8a857; width: 280px; }
        h1 { color: #d8a857; }
        .btn { display: block; background-color: #d8a857; color: #000; padding: 10px; margin-top: 20px; text-decoration: none; border-radius: 10px; font-weight: bold; }
    </style>
</head>
<body>
    <h1>خزمەتێن KurdSoft</h1>
    <p>باشترین اشتراکان ل بەر دەستن</p>
    
    <div class="container">
        <div class="card">
            <h3>اشتراکێ بێ یاسایی</h3>
            <p>بهایێ: 10$</p>
            <a href="https://wa.me/YOUR_NUMBER" class="btn">کریین ل واتسئاپێ</a>
        </div>
        <div class="card">
            <h3>اشتراکێ زێڕین</h3>
            <p>بهایێ: 25$</p>
            <a href="https://wa.me/YOUR_NUMBER" class="btn">کریین ل واتسئاپێ</a>
        </div>
    </div>
</body>
</html>
