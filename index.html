<!DOCTYPE html>
<html lang="ku" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>KurdSoft - Store</title>
    <style>
        :root { --bg: #f4f4f9; --text: #333; --gold: #d8a857; }
        body.dark-mode { --bg: #0f1b1c; --text: #fff; }
        body { background-color: var(--bg); color: var(--text); font-family: sans-serif; transition: 0.5s; }
        .nav { padding: 20px; display: flex; justify-content: space-between; align-items: center; }
        .container { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 20px; padding: 20px; }
        .card { background: #1c2e30; color: #fff; padding: 20px; border-radius: 15px; border: 2px solid var(--gold); }
        .product-img { width: 100%; height: 200px; border-radius: 10px; object-fit: cover; }
        .btn { display: block; background: var(--gold); padding: 10px; text-align: center; color: #000; text-decoration: none; border-radius: 5px; margin-top: 10px; }
        .social { margin-top: 20px; text-align: center; }
        .social a { margin: 0 10px; color: var(--gold); font-size: 20px; text-decoration: none; }
    </style>
</head>
<body>
    <div class="nav">
        <h1>KurdSoft</h1>
        <button onclick="document.body.classList.toggle('dark-mode')">شەڤ/ڕۆژ</button>
    </div>

    <div class="container" id="product-list">
        <!-- ل ڤێرێ بەرهەم دهێنە زێدەکرن -->
    </div>

    <div class="social">
        <a href="https://facebook.com/yourpage">Facebook</a>
        <a href="https://instagram.com/yourpage">Instagram</a>
        <a href="https://wa.me/yournumber">WhatsApp</a>
        <a href="https://tiktok.com/@yourpage">TikTok</a>
    </div>

    <script>
        // هارىڤان: تو تەنێ ڤى بژى دێ زێدە کەی بۆ ئادمینی!
        const products = [
            { name: "بەرنامێ ئێکێ", price: "25$", desc: "وەسفا بەرنامەی ل ڤێرێ", img: "app1.jpg" },
            { name: "بەرنامێ دووێ", price: "10$", desc: "وەسفا بەرنامەی ل ڤێرێ", img: "app2.jpg" }
        ];

        const list = document.getElementById('product-list');
        products.forEach(p => {
            list.innerHTML += `<div class="card">
                <img src="${p.img}" class="product-img">
                <h3>${p.name}</h3>
                <p>${p.desc}</p>
                <p><strong>${p.price}</strong></p>
                <a href="#" class="btn">کریین</a>
            </div>`;
        });
    </script>
</body>
</html>
