<!DOCTYPE html>
<html lang="ku" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>KurdSoft</title>
    <style>
        body { font-family: sans-serif; background-color: #0f1b1c; color: #fff; text-align: center; padding: 20px; }
        .lang-btn { cursor: pointer; color: #d8a857; margin: 0 10px; font-weight: bold; }
    </style>
</head>
<body>
    <!-- زمان -->
    <div class="lang-bar">
        <span class="lang-btn" onclick="changeLang('ku')">کوردی</span> | 
        <span class="lang-btn" onclick="changeLang('ar')">العربية</span> | 
        <span class="lang-btn" onclick="changeLang('en')">English</span>
    </div>

    <!-- نڤیسینێن کو دێ گوهۆڕن -->
    <h1 id="title">KurdSoft</h1>
    <p id="desc">باشترین اشتراکان ل بەر دەستن</p>

    <script>
        const content = {
            ku: { title: "KurdSoft", desc: "باشترین اشتراکان ل بەر دەستن" },
            ar: { title: "KurdSoft", desc: "أفضل الاشتراکات لدیینا" },
            en: { title: "KurdSoft", desc: "Best subscriptions available" }
        };

        function changeLang(lang) {
            document.getElementById('title').innerText = content[lang].title;
            document.getElementById('desc').innerText = content[lang].desc;
            document.documentElement.dir = (lang === 'en') ? 'ltr' : 'rtl';
        }
    </script>
</body>
</html>
